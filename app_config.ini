# Football Prediction System - Central Configuration
# ===================================================
# This file centralizes all application-wide settings.

[app]
name = "Football Prediction System"
version = "2.0.0"
default_output_dir = "output"
default_verbose = false

[pipeline]
default_date_format = "%Y%m%d"
max_matches_per_day = 50
enable_sanity_checks = true

[output]
predictions_dir = "output/predictions"
daily_dir = "output/daily"
reports_dir = "output/reports"
players_dir = "output/players"
timelines_dir = "output/timelines"
lambda_validation_dir = "output/lambda_validation"
calibration_eval_dir = "output/calibration_eval"

[display]
default_table_format = "table"
color_scheme = "rich_default"
show_progress_bars = true

[data]
fixtures_dir = "data/fixtures"
ratings_file = "data/ratings_wc2026.json"
cache_dir = "data/cache"
cache_ttl_hours = 1

[model]
config_file = "predicciones/configs/model_config.yaml"
daily_config_file = "predicciones/configs/daily_predictions_config.json"

[thresholds]
lambda_home_warning = 3.0
lambda_away_warning = 2.5
lambda_total_warning = 5.0
min_fav_prob_given_ratio_2 = 0.55
min_fav_prob_given_ratio_3 = 0.70

[backtest]
default_num_matches = 200
compare_markov = true
cv_folds = 5

[recent_files]
default_limit = 10
file_types = ["all", "predictions", "reports", "metrics"]
